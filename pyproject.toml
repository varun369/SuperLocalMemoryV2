[project]
name = "superlocalmemory"
version = "3.0.8"
description = "Information-geometric agent memory with mathematical guarantees"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [
    {name = "Varun Pratap Bhardwaj", email = "admin@superlocalmemory.com"},
]
keywords = [
    "ai-memory", "mcp-server", "local-first", "agent-memory",
    "information-geometry", "privacy-first", "eu-ai-act",
]

dependencies = [
    "httpx>=0.24.0",
    "numpy>=1.26.0,<3.0.0",
    "scipy>=1.12.0,<2.0.0",
    "networkx>=3.0",
    "mcp>=1.0.0",
    "python-dateutil>=2.9.0.post0",
    "rank-bm25>=0.2.2",
    "vadersentiment>=3.3.2",
    "einops>=0.8.2",
]

[project.optional-dependencies]
search = [
    "sentence-transformers>=2.5.0,<4.0.0",
    "einops>=0.7.0,<1.0.0",
    "torch>=2.2.0",
    "scikit-learn>=1.3.0,<2.0.0",
    "geoopt>=0.5.0",
]
ui = [
    "fastapi>=0.109.0,<1.0.0",
    "uvicorn[standard]>=0.27.0,<1.0.0",
    "python-multipart>=0.0.6,<1.0.0",
]
learning = [
    "lightgbm>=4.0.0,<5.0.0",
]
performance = [
    "diskcache>=5.6.0,<6.0.0",
    "orjson>=3.9.0,<4.0.0",
]
full = [
    "superlocalmemory[search,ui,learning,performance]",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
]

[project.urls]
Homepage = "https://superlocalmemory.com"
Repository = "https://github.com/qualixar/superlocalmemory"
Documentation = "https://github.com/qualixar/superlocalmemory/wiki"
Issues = "https://github.com/qualixar/superlocalmemory/issues"

[project.scripts]
slm = "superlocalmemory.cli.main:main"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
